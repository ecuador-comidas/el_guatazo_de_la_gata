<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurante</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow-x: hidden;
}

/* ── Fondo oscuro base ── */
.page {
  min-height: 100vh;
  background: #0a0400;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2.5rem 1.5rem 4rem;
  font-family: 'Cormorant Garamond', serif;
  position: relative;
  overflow: hidden;
}

/* ── Canvas de llamas (detrás de todo) ── */
#fireCanvas {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* ── Resplandor ambiental de fuego ── */
.ember-glow {
  position: fixed;
  bottom: -60px;
  left: 50%;
  transform: translateX(-50%);
  width: 120%;
  height: 55vh;
  background: radial-gradient(ellipse at 50% 100%,
    rgba(255, 80, 0, 0.55) 0%,
    rgba(200, 40, 0, 0.30) 35%,
    rgba(100, 10, 0, 0.15) 65%,
    transparent 100%
  );
  pointer-events: none;
  z-index: 1;
  animation: glowPulse 3s ease-in-out infinite alternate;
}

@keyframes glowPulse {
  0%   { opacity: 0.7; transform: translateX(-50%) scaleX(1); }
  100% { opacity: 1;   transform: translateX(-50%) scaleX(1.06); }
}

/* ── Contenido ── */
.content {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

.ornament {
  color: #ffd700;
  font-size: 12px;
  letter-spacing: 6px;
  text-transform: uppercase;
  opacity: 0.85;
  margin-bottom: 0.5rem;
  text-shadow: 0 0 12px rgba(255, 160, 0, 0.8);
}

/* ── Logo con anillo de fuego ── */
.logo-wrap {
  position: relative;
  width: 130px;
  height: 130px;
  margin: 1rem 0 0.8rem;
}

.logo-ring {
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 2px solid transparent;
  background: conic-gradient(
    #ff4500, #ff8c00, #ffd700, #ff8c00, #ff4500, #cc2200, #ff4500
  ) border-box;
  animation: spinRing 4s linear infinite;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out;
  mask-composite: exclude;
}

@keyframes spinRing {
  to { transform: rotate(360deg); }
}

.logo {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  border: 2px solid #ffd700;
  overflow: hidden;
  box-shadow:
    0 0 20px rgba(255, 100, 0, 0.7),
    0 0 50px rgba(255, 60, 0, 0.35),
    inset 0 0 20px rgba(255, 60, 0, 0.15);
  animation: logoFlicker 2.5s ease-in-out infinite alternate;
}

@keyframes logoFlicker {
  0%   { box-shadow: 0 0 18px rgba(255,100,0,0.7), 0 0 45px rgba(255,60,0,0.30); }
  50%  { box-shadow: 0 0 30px rgba(255,140,0,0.9), 0 0 65px rgba(255,80,0,0.50); }
  100% { box-shadow: 0 0 20px rgba(255,60,0,0.65), 0 0 40px rgba(200,30,0,0.25); }
}

.logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ── Textos ── */
.title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(24px, 5vw, 32px);
  color: #fff3b0;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-shadow:
    0 0 10px rgba(255,160,0,0.9),
    0 0 25px rgba(255,80,0,0.5);
  animation: titleFlicker 3s ease-in-out infinite alternate;
}

@keyframes titleFlicker {
  0%   { text-shadow: 0 0 10px rgba(255,160,0,0.9), 0 0 25px rgba(255,80,0,0.5); }
  60%  { text-shadow: 0 0 18px rgba(255,200,0,1),   0 0 40px rgba(255,100,0,0.7); }
  100% { text-shadow: 0 0 8px rgba(255,120,0,0.7),  0 0 20px rgba(200,40,0,0.4); }
}

.subtitle {
  font-size: 12px;
  color: #ffd700;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 2rem;
  opacity: 0.85;
  text-shadow: 0 0 8px rgba(255, 160, 0, 0.6);
}

/* ── Divisor ── */
.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 2rem;
  width: clamp(180px, 50vw, 260px);
}
.divider-line {
  flex: 1;
  height: 0.5px;
  background: linear-gradient(to right, transparent, #ff6a00, transparent);
}
.divider-diamond {
  width: 6px; height: 6px;
  background: #ffd700;
  transform: rotate(45deg);
  box-shadow: 0 0 6px rgba(255,200,0,0.9);
}

/* ── Botones ── */
.buttons {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 22px;
  background: rgba(180, 40, 0, 0.12);
  border: 1px solid rgba(255, 120, 0, 0.35);
  border-radius: 5px;
  color: #f0e6c8;
  text-decoration: none;
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(16px, 3.5vw, 19px);
  letter-spacing: 1px;
  transition: background 0.25s, border-color 0.25s, color 0.25s, box-shadow 0.25s;
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,100,0,0.08), transparent);
  transform: translateX(-100%);
  transition: transform 0.4s ease;
}

.btn:hover::before {
  transform: translateX(100%);
}

.btn:hover {
  background: rgba(200, 60, 0, 0.22);
  border-color: rgba(255, 160, 0, 0.75);
  color: #ffd700;
  box-shadow:
    0 0 12px rgba(255, 80, 0, 0.25),
    inset 0 0 15px rgba(255, 60, 0, 0.08);
}

.btn-icon {
  font-size: 20px;
  margin-right: 4px;
}

.btn-arrow {
  color: #ff8c00;
  font-size: 20px;
  opacity: 0.8;
}

.footer-ornament {
  margin-top: 2rem;
  color: #ff6a00;
  opacity: 0.4;
  font-size: 16px;
  letter-spacing: 8px;
}

/* ── Partículas de brasa ── */
.embers {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}

.ember {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, #fff5a0, #ff8c00, transparent);
  animation: floatEmber linear infinite;
  opacity: 0;
}

@keyframes floatEmber {
  0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
  10%  { opacity: 1; }
  80%  { opacity: 0.6; }
  100% { transform: translateY(-80vh) translateX(var(--drift)) scale(0.3); opacity: 0; }
}
</style>
</head>
<body>

<!-- Canvas llamas -->
<canvas id="fireCanvas"></canvas>

<!-- Resplandor ambiental -->
<div class="ember-glow"></div>

<!-- Brasas flotantes -->
<div class="embers" id="embers"></div>

<div class="page">
  <div class="content">

    <p class="ornament">✦ Restaurante ✦</p>

    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <div class="logo">
        <img src="img/logo.jpg" alt="Logo" onerror="this.style.display='none'; this.parentElement.style.background='radial-gradient(circle at 40% 35%, #ff8c00, #cc2200)'">
      </div>
    </div>

    <h1 class="title">La Delicia</h1>
    <p class="subtitle">Comida &amp; Experiencia</p>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <div class="buttons">
      <a href="pagina.html" class="btn">
        <span><span class="btn-icon">🌐</span> Ver Sitio Web</span>
        <span class="btn-arrow">›</span>
      </a>
      <a href="menu.html" class="btn">
        <span><span class="btn-icon">📋</span> Ver Menú Completo</span>
        <span class="btn-arrow">›</span>
      </a>
      <a href="redes_sociales.html" class="btn">
        <span><span class="btn-icon">📱</span> Redes Sociales</span>
        <span class="btn-arrow">›</span>
      </a>
      <a href="ubicacion.html" class="btn">
        <span><span class="btn-icon">📍</span> Ubicación del Local</span>
        <span class="btn-arrow">›</span>
      </a>
      <a href="horario.html" class="btn">
        <span><span class="btn-icon">🕐</span> Horario de Atención</span>
        <span class="btn-arrow">›</span>
      </a>
    </div>

    <p class="footer-ornament">— 🔥 —</p>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   FIRE CANVAS — algoritmo clásico de fuego
   pixel por pixel con blur + rise
══════════════════════════════════════════ */
const canvas = document.getElementById('fireCanvas');
const ctx = canvas.getContext('2d');

let W, H, cols, rows, buf, imgData;

// Paleta de fuego: negro → rojo → naranja → amarillo → blanco
function buildPalette() {
  const pal = [];
  for (let i = 0; i < 256; i++) {
    let r, g, b;
    if (i < 64) {
      r = Math.round(i * 3);     g = 0;                    b = 0;
    } else if (i < 128) {
      r = 192 + Math.round((i-64)*1);  g = Math.round((i-64)*2.5); b = 0;
    } else if (i < 192) {
      r = 255; g = 160 + Math.round((i-128)*1.5); b = Math.round((i-128)*1.2);
    } else {
      r = 255; g = 255; b = Math.round((i-192)*3.5);
    }
    pal.push([Math.min(255,r), Math.min(255,g), Math.min(255,b)]);
  }
  return pal;
}
const palette = buildPalette();

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  // Trabajamos a menor resolución para performance
  cols = Math.ceil(W / 3);
  rows = Math.ceil(H / 3);
  canvas.width  = W;
  canvas.height = H;
  buf = new Uint8Array(cols * rows);
  imgData = ctx.createImageData(W, H);
}

function seedBottom() {
  // Sembramos calor en la fila inferior con variación aleatoria
  const y = rows - 1;
  for (let x = 0; x < cols; x++) {
    buf[y * cols + x] = Math.random() < 0.55
      ? Math.floor(200 + Math.random() * 55)
      : Math.floor(Math.random() * 120);
  }
  // También la penúltima fila
  const y2 = rows - 2;
  for (let x = 0; x < cols; x++) {
    buf[y2 * cols + x] = Math.random() < 0.45
      ? Math.floor(180 + Math.random() * 75)
      : Math.floor(Math.random() * 80);
  }
}

function stepFire() {
  seedBottom();
  for (let y = 0; y < rows - 1; y++) {
    for (let x = 0; x < cols; x++) {
      const src =
        buf[(y + 1) * cols + ((x - 1 + cols) % cols)] +
        buf[(y + 1) * cols + x] +
        buf[(y + 1) * cols + ((x + 1) % cols)] +
        buf[Math.min(y + 2, rows - 1) * cols + x];
      buf[y * cols + x] = Math.max(0, Math.floor(src / 4.05));
    }
  }
}

function draw() {
  // Escalamos de la grilla pequeña al canvas grande
  const scaleX = W / cols;
  const scaleY = H / rows;
  const d = imgData.data;

  // Llenamos cada píxel del canvas
  for (let cy = 0; cy < rows; cy++) {
    for (let cx = 0; cx < cols; cx++) {
      const v = buf[cy * cols + cx];
      const [r, g, b] = palette[v];

      const px0 = Math.floor(cx * scaleX);
      const px1 = Math.floor((cx + 1) * scaleX);
      const py0 = Math.floor(cy * scaleY);
      const py1 = Math.floor((cy + 1) * scaleY);

      for (let py = py0; py < py1; py++) {
        for (let px = px0; px < px1; px++) {
          const idx = (py * W + px) * 4;
          d[idx]     = r;
          d[idx + 1] = g;
          d[idx + 2] = b;
          d[idx + 3] = v < 5 ? 0 : Math.min(255, v * 2);
        }
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

function loop() {
  stepFire();
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('resize', resize);
resize();
loop();

/* ══════════════════════════════════════════
   PARTÍCULAS DE BRASA flotantes
══════════════════════════════════════════ */
const emberContainer = document.getElementById('embers');

function spawnEmber() {
  const el = document.createElement('div');
  el.className = 'ember';
  const size = 2 + Math.random() * 4;
  const left = 10 + Math.random() * 80;
  const duration = 3 + Math.random() * 5;
  const drift = (Math.random() - 0.5) * 120;
  el.style.cssText = `
    width:${size}px; height:${size}px;
    left:${left}%;
    bottom: ${Math.random() * 20}%;
    --drift: ${drift}px;
    animation-duration: ${duration}s;
    animation-delay: ${Math.random() * 4}s;
  `;
  emberContainer.appendChild(el);
  setTimeout(() => el.remove(), (duration + 4) * 1000);
}

// Lanzar brasas periódicamente
setInterval(spawnEmber, 300);
// Lanzar unas iniciales de golpe
for (let i = 0; i < 15; i++) spawnEmber();
</script>
</body>
</html>
